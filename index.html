<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Family Offices · Immobilien-Map</title>
<link rel="stylesheet" href="./vendor/leaflet.css" />
<script src="./vendor/leaflet.js"></script>
<script src="./vendor/react.js"></script>
<script src="./vendor/react-dom.js"></script>
<script src="./vendor/babel.js"></script>
<script src="./vendor/xlsx.js"></script>

<style>
  :root{
    --navy:#0A1F44; --navy2:#13294B; --gold:#FFC72C; --red:#E4002B;
    --bg:#eef1f5; --panel:rgba(255,255,255,.82); --stroke:#dfe3ea; --txt:#0A1F44; --muted:#5b6577; --accent:#0A1F44;
  }
  *{box-sizing:border-box}
  html,body,#root{height:100%;margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--txt);background:var(--bg)}
  #map{position:absolute;inset:0;z-index:0}
  .glass{background:var(--panel);backdrop-filter:saturate(180%) blur(22px);-webkit-backdrop-filter:saturate(180%) blur(22px);border:1px solid var(--stroke);border-radius:18px;box-shadow:0 10px 34px rgba(10,31,68,.18)}
  .lights{display:flex;gap:8px;align-items:center}
  .light{width:13px;height:13px;border-radius:50%;cursor:pointer;box-shadow:inset 0 0 0 1px rgba(0,0,0,.14)}
  .l-red{background:#ff5f57}.l-yellow{background:#febc2e}.l-green{background:#28c840}
  .light.dis{cursor:default;opacity:.5}
  .topbar{position:absolute;top:14px;left:14px;z-index:500;padding:10px 16px;display:flex;align-items:center;gap:12px}
  .topbar h1{font-size:15px;margin:0;font-weight:700;letter-spacing:-.2px;color:var(--navy)}
  .topbar .sub{font-size:11px;color:var(--muted)}
  .iBtn{width:22px;height:22px;border-radius:50%;border:1px solid var(--stroke);background:#fff;color:var(--navy);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
  h2.hd{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 10px}
  .panel{padding:14px}
  /* right stacked column – no overlaps */
  .rightcol{position:absolute;top:14px;right:14px;width:266px;max-height:calc(100vh - 28px);overflow-y:auto;z-index:500;display:flex;flex-direction:column;gap:12px;padding-bottom:4px}
  .dotrow{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:12px;cursor:pointer;transition:background .15s;user-select:none}
  .dotrow:hover{background:rgba(10,31,68,.05)}
  .dot{width:15px;height:15px;border-radius:50%;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
  .dotrow.off{opacity:.42}.dotrow.off .dot{background:#c7c7cc!important}
  .dotlabel{font-size:12.5px;line-height:1.25}
  .stat{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
  .stat b{font-variant-numeric:tabular-nums;color:var(--navy)}
  .pie-wrap{display:flex;flex-direction:column;align-items:center;margin-top:6px}
  .pielegend{width:100%;margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:2px 8px}
  .pchip{display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer;padding:2px 3px;border-radius:7px;user-select:none}
  .pchip:hover{background:rgba(10,31,68,.06)}.pchip.off{opacity:.36;text-decoration:line-through}
  .sw{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
  .adv{position:absolute;top:64px;left:14px;width:300px;max-height:calc(100vh - 150px);overflow:auto;z-index:500;padding:14px}
  .fld{margin:9px 0}.fld label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px}
  select,input[type=number]{width:100%;padding:7px 9px;border:1px solid var(--stroke);border-radius:10px;font-size:13px;background:#fff;color:var(--txt)}
  .row2{display:flex;gap:8px}
  .chkgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px 8px}
  .chk{display:flex;align-items:center;gap:6px;font-size:11.5px;cursor:pointer;user-select:none;padding:2px}
  .chk .sw{width:9px;height:9px}
  .togg{display:flex;align-items:center;gap:8px;font-size:12.5px;cursor:pointer;user-select:none;padding:3px 0}
  .switch{width:34px;height:20px;border-radius:20px;background:#c9ced8;position:relative;transition:background .15s;flex:0 0 auto}
  .switch.on{background:var(--navy)}
  .switch i{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .switch.on i{left:16px}
  .btn{appearance:none;border:none;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;background:var(--navy);color:#fff;transition:filter .15s}
  .btn:hover{filter:brightness(1.15)}
  .btn.sec{background:#fff;color:var(--navy);border:1px solid var(--stroke)}
  .btn.ghost{background:rgba(10,31,68,.07);color:var(--navy)}
  .btn.wide{width:100%}.btnrow{display:flex;gap:8px;margin-top:8px}
  .pininfo{font-size:11px;color:var(--muted);margin-top:4px}
  .layerToggle{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:500;display:flex;gap:2px;padding:4px;border-radius:12px}
  .layerToggle button{border:none;background:transparent;padding:6px 14px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;color:var(--navy)}
  .layerToggle button.on{background:var(--navy);color:#fff}
  .detail h3{margin:0 0 2px;font-size:16px;color:var(--navy)}
  .detail .meta{font-size:12px;color:var(--muted);margin-bottom:10px}
  .kv{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;padding:4px 0;border-top:1px solid var(--stroke)}
  .kv span:first-child{color:var(--muted)}
  a.lnk,.src a{color:#1c58c9;text-decoration:none;word-break:break-word}
  a.lnk:hover,.src a:hover{text-decoration:underline}
  .est-badge{display:inline-block;font-size:10px;font-weight:700;color:#7a5200;background:var(--gold);border-radius:6px;padding:1px 6px;margin-left:6px}
  .sold-badge{display:inline-block;font-size:10px;font-weight:700;color:#fff;background:var(--red);border-radius:6px;padding:1px 6px;margin-left:6px}
  .src{margin-top:3px;font-size:11px;color:var(--muted);line-height:1.5}
  .src .lab{font-weight:700;color:#3b4658}
  .srcbox{background:rgba(10,31,68,.04);border-radius:10px;padding:8px 10px;margin:6px 0}
  .brandhead{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .brandhead img{width:30px;height:30px;border-radius:7px;object-fit:contain;background:#fff;border:1px solid var(--stroke)}
  .objlist{margin-top:10px}
  .obj{font-size:12px;padding:7px 0;border-top:1px solid var(--stroke);cursor:pointer}
  .obj:hover{color:var(--navy)}.obj b{font-weight:700}.obj .a{color:var(--muted)}
  .winwrap{position:absolute;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(10,31,68,.3)}
  .win{width:min(1180px,95vw);height:min(78vh,760px);display:flex;flex-direction:column;overflow:hidden}
  .win.min{height:46px}.win.max{width:100vw;height:100vh;border-radius:0}
  .titlebar{height:46px;flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid var(--stroke);background:rgba(255,255,255,.7)}
  .titlebar .t{font-size:13px;font-weight:700;color:var(--navy)}.titlebar .sp{flex:1}
  .tblscroll{flex:1;overflow:auto}
  table{border-collapse:collapse;width:100%;font-size:12.5px}
  th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--stroke);white-space:nowrap}
  th{position:sticky;top:0;background:#f3f5f9;cursor:pointer;user-select:none;font-weight:700;color:var(--navy)}
  th:hover{color:var(--red)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tr:hover td{background:rgba(10,31,68,.05)}
  .s3wrap{position:absolute;inset:0;z-index:1100;display:flex;align-items:center;justify-content:center;background:rgba(10,31,68,.32)}
  .s3{width:min(470px,92vw);max-height:86vh;overflow:auto;padding:0}
  .s3 .hd{padding:12px 16px;border-bottom:1px solid var(--stroke);display:flex;align-items:center;gap:10px}
  .s3 .bd{padding:14px 16px}.s3 h3{margin:0 0 2px;font-size:16px;color:var(--navy)}
  .tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px;color:#fff}
  .discpop{position:absolute;top:52px;left:14px;z-index:700;width:330px;padding:14px;font-size:12px;line-height:1.5}
  .disc{position:absolute;bottom:58px;right:14px;z-index:450;font-size:10.5px;color:var(--muted);max-width:250px;text-align:right;line-height:1.35;pointer-events:none}
  .leaflet-div-icon{background:transparent;border:none}
  /* HQ nameplate: solid shield behind BOTH logo and full name */
  .hqbox{display:inline-flex;width:max-content;align-items:center;gap:7px;padding:4px 12px 4px 8px;border-radius:13px;background:#ffffff;border:2px solid var(--ring,#ccc);box-shadow:0 3px 10px rgba(10,31,68,.30);cursor:pointer;transition:transform .12s;white-space:nowrap}
  .hqbox.est{border-style:dashed}
  .hqbox.sel{transform:scale(1.14);box-shadow:0 0 0 3px rgba(10,31,68,.3),0 2px 10px rgba(10,31,68,.35)}
  .hqbox.hl{animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,199,44,0),0 2px 8px rgba(10,31,68,.28)}50%{box-shadow:0 0 0 6px rgba(255,199,44,.6),0 2px 8px rgba(10,31,68,.3)}}
  /* logo sits ON the same shield – no separate box of its own */
  .hqico{width:19px;height:19px;border-radius:4px;object-fit:contain;flex:0 0 auto;background:transparent}
  .hqname{font-size:12.5px;font-weight:700;color:var(--navy);line-height:1.05;max-width:190px}
  .heatpoly{filter:blur(3px)}
  /* ---- push-pins: what you see when zoomed out, like pins stuck in a printed map ---- */
  /* a pin = a big round coloured head with a glossy highlight, sitting on a needle whose tip is exactly on the spot */
  .pin{display:flex;flex-direction:column;align-items:center;cursor:pointer}
  .pin .head{border-radius:50%;border:2px solid #fff;box-sizing:border-box;position:relative;
    box-shadow:0 3px 5px rgba(10,31,68,.55),0 1px 0 rgba(255,255,255,.4)}
  .pin .head::after{content:"";position:absolute;top:16%;left:18%;width:34%;height:34%;border-radius:50%;
    background:radial-gradient(circle at 40% 40%, rgba(255,255,255,.95), rgba(255,255,255,0) 70%)}
  .pin .needle{width:3px;margin-top:-2px;background:linear-gradient(to bottom,#f4f6fa 0%, #c3ccda 55%, rgba(120,132,150,.35) 100%);
    box-shadow:0 2px 3px rgba(10,31,68,.5);border-radius:0 0 2px 2px}
  .pin.sold .head{border-style:dashed}
  .pin.hqpin .head{cursor:pointer}
  /* object markers when zoomed in: colour-coded badge with a type icon */
  .objbadge{border-radius:50%;box-shadow:0 1px 5px rgba(10,31,68,.45);display:flex;align-items:center;justify-content:center;line-height:1;box-sizing:border-box;cursor:pointer}
  .objbadge.sold{border-style:dashed!important;opacity:.8}
  .objico{line-height:1;filter:drop-shadow(0 0 1px rgba(255,255,255,.9))}
  /* bottom-left selection dock */
  .seldock{position:absolute;left:14px;bottom:14px;z-index:600;width:244px;padding:12px 13px;max-height:56vh;display:flex;flex-direction:column}
  .seldock-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .seldock-h b{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  .seldock .mini{border:none;background:rgba(228,0,43,.1);color:var(--red);font-size:11px;font-weight:700;border-radius:8px;padding:3px 8px;cursor:pointer}
  .selchips{display:flex;flex-direction:column;gap:5px;overflow-y:auto}
  .selchip{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--navy);background:#fff;border:1px solid var(--stroke);border-left:3px solid var(--ring,#ccc);border-radius:9px;padding:5px 7px}
  .selchip .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .selchip .x{cursor:pointer;color:var(--muted);font-weight:700;padding:0 3px;border-radius:5px}
  .selchip .x:hover{background:rgba(228,0,43,.12);color:var(--red)}
  .selempty{font-size:12px;color:var(--muted);line-height:1.4;margin-bottom:8px}
  .selexp{margin-top:9px;border-top:1px solid var(--stroke);padding-top:9px}
  .selexp-h{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;color:var(--navy);cursor:pointer;user-select:none}
  .selexp-list{margin-top:7px;max-height:32vh;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
  .selrow{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:5px 6px;border-radius:7px;cursor:pointer}
  .selrow:hover{background:rgba(10,31,68,.06)}
  .sc-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(0,0,0,.1)}
  @media (max-width:900px){ .rightcol{width:220px} .adv{width:230px} .seldock{width:210px} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo}=React;
const DATA=window.FO_DATA, UL=window.USAGE_LABELS, UC=window.USAGE_COLORS, CM=window.CATEGORY_META, INT=window.INTENSITY;
const USAGE_KEYS=Object.keys(UL), CATS=["gruen","gelb","rot"];
// small type "logo" per usage: office=skyscraper, living=house, logistics=truck, …
const USAGE_EMOJI={ Buero:"🏢", Wohnen:"🏠", Retail:"🏬", Logistik:"🚚", Hotel:"🏨", Gastro:"🍽️", Sonstiges:"🏙️" };
const fmtB=n=> n>=1? (n>=10?n.toFixed(0):n.toFixed(1))+" Mrd €" : (n*1000).toFixed(0)+" Mio €";
const hv=(a,b,c,d)=>{const R=6371,t=x=>x*Math.PI/180;const p=t(c-a),q=t(d-b);
  const s=Math.sin(p/2)**2+Math.cos(t(a))*Math.cos(t(c))*Math.sin(q/2)**2;return 2*R*Math.asin(Math.sqrt(s));};
const isSold=ob=>/verkauf/i.test(ob.status||"");
const ico=d=>`https://icons.duckduckgo.com/ip3/${d}.ico`;
const HEAT={ niedrig:"#5aa9ff", mittel:"#ffb02e", hoch:"#ff5a5f" };
function seedOf(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))%1000;return h/1000*6.28;}
// organic (non-circular) region polygon
function blob(center,radiusKm,seed){
  const lat=center[0],lng=center[1],N=20,pts=[];
  const kLat=1/111, kLng=1/(111*Math.cos(lat*Math.PI/180));
  for(let i=0;i<N;i++){const a=i/N*2*Math.PI;
    const r=radiusKm*(0.80+0.20*Math.sin(a*3+seed)+0.12*Math.sin(a*5+seed*1.7)+0.06*Math.sin(a*2+seed*0.6));
    pts.push([lat+r*kLat*Math.cos(a), lng+r*kLng*Math.sin(a)]);}
  return pts;
}

function Lights({onClose,onMin,onMax}){
  return (<div className="lights">
    <span className="light l-red" title="Schließen" onClick={onClose}/>
    <span className={"light l-yellow"+(onMin?"":" dis")} title={onMin?"Minimieren":""} onClick={onMin||undefined}/>
    <span className={"light l-green"+(onMax?"":" dis")} title={onMax?"Maximieren":""} onClick={onMax||undefined}/>
  </div>);
}

function Sources({field,label}){
  if(!field)return null;
  const ext=field.basis==="extrapolation", noSrc=!field.sources||field.sources.length===0;
  return (<div className="src">
    <span className="lab">{label}:</span>{" "}
    {ext&&noSrc&&<span>Reine Einschätzung (Extrapolation) – keine Einzelquelle.</span>}
    {ext&&!noSrc&&<span>Einschätzung, gestützt auf: </span>}
    {!ext&&<span>Quelle: </span>}
    {!noSrc&&field.sources.map((s,i)=><span key={i}>{i>0?" · ":""}<a href={s.url} target="_blank" rel="noopener">{s.label}</a></span>)}
    {field.note&&<div style={{marginTop:2,fontStyle:"italic"}}>{field.note}</div>}
  </div>);
}

function Pie({data,activeUsages,onToggle}){
  const entries=USAGE_KEYS.map(k=>({k,v:data[k]||0})).filter(e=>e.v>0);
  const total=entries.reduce((s,e)=>s+e.v,0)||1;let acc=0;const R=52,C=60;
  const arcs=entries.map(e=>{const a0=acc/total*2*Math.PI,a1=(acc+e.v)/total*2*Math.PI;acc+=e.v;
    const x0=C+R*Math.sin(a0),y0=C-R*Math.cos(a0),x1=C+R*Math.sin(a1),y1=C-R*Math.cos(a1);
    return {...e,d:`M${C},${C} L${x0},${y0} A${R},${R} 0 ${(a1-a0)>Math.PI?1:0} 1 ${x1},${y1} Z`,on:activeUsages.has(e.k)};});
  return (<div className="pie-wrap">
    <svg width="118" height="118" viewBox="0 0 120 120">
      {arcs.map(a=><path key={a.k} d={a.d} fill={UC[a.k]} opacity={a.on?1:.22} stroke="#fff" strokeWidth="1.5" style={{cursor:"pointer"}} onClick={()=>onToggle(a.k)}/>)}
      <circle cx="60" cy="60" r="26" fill="rgba(255,255,255,.92)"/>
    </svg>
    <div className="pielegend">
      {USAGE_KEYS.map(k=><div key={k} className={"pchip"+(activeUsages.has(k)?"":" off")} onClick={()=>onToggle(k)}><span className="sw" style={{background:UC[k]}}/> {UL[k]}</div>)}
    </div>
  </div>);
}

function App(){
  const mapRef=useRef(null),hqL=useRef(null),objL=useRef(null),heatL=useRef(null),pinL=useRef(null),tiles=useRef({});
  const [activeCats,setActiveCats]=useState(new Set(CATS));
  const [activeUsages,setActiveUsages]=useState(new Set(USAGE_KEYS));
  const [country,setCountry]=useState("all"),[typF,setTypF]=useState("all");
  const [minAum,setMinAum]=useState(0),[maxAum,setMaxAum]=useState(50),[minReQ,setMinReQ]=useState(0);
  const [onlyObjects,setOnlyObjects]=useState(false),[showSold,setShowSold]=useState(true);
  const [pin,setPin]=useState(null),[pinRadius,setPinRadius]=useState(30),[pinMode,setPinMode]=useState(false);
  const [selected,setSelected]=useState(new Set());
  const [selOpen,setSelOpen]=useState(false);
  const [showTable,setShowTable]=useState(false),[winMode,setWinMode]=useState("normal");
  const [sortKey,setSortKey]=useState("aumV"),[sortDir,setSortDir]=useState(-1);
  const [detail,setDetail]=useState(null);
  const [baseLayer,setBaseLayer]=useState("sat"),[showDisc,setShowDisc]=useState(false);
  const [zoom,setZoom]=useState(6);
  const sref=useRef({});
  const countries=useMemo(()=>["all",...Array.from(new Set(DATA.map(o=>o.land)))],[]);

  const passesBase=o=> activeCats.has(o.category)&&(country==="all"||o.land===country)&&(typF==="all"||o.typ===typF)
    &&o.aum.value>=minAum&&o.aum.value<=maxAum&&o.reQuote.value*100>=minReQ&&(!onlyObjects||o.confirmedObjects.length>0);
  const officeUsagePass=o=> USAGE_KEYS.some(k=>o.usage[k]>0&&activeUsages.has(k));
  const confInRadius=o=> !pin?[]:o.confirmedObjects.filter(ob=>activeUsages.has(ob.usage)&&(showSold||!isSold(ob))&&hv(pin.lat,pin.lng,ob.lat,ob.lng)<=pinRadius);
  const heatOverlap=o=> !pin?[]:(o.heatmap||[]).filter(r=>(r.usages===null||r.usages.some(u=>activeUsages.has(u)))&&hv(pin.lat,pin.lng,r.center[0],r.center[1])<=pinRadius+r.radiusKm);

  const visible=useMemo(()=>{const out=[];
    DATA.forEach(o=>{ if(!passesBase(o))return;
      if(pin){const conf=confInRadius(o),heat=heatOverlap(o);
        if(conf.length>0)out.push({o,type:"confirmed",conf,heat});
        else if(heat.length>0)out.push({o,type:"estimated",conf:[],heat});
      } else if(officeUsagePass(o)) out.push({o,type:"confirmed",conf:o.confirmedObjects,heat:o.heatmap||[]});
    });return out;
  },[activeCats,activeUsages,country,typF,minAum,maxAum,minReQ,onlyObjects,showSold,pin,pinRadius]);
  const visOffices=visible.map(v=>v.o);

  const agg=useMemo(()=>{const count=visOffices.length,aum=visOffices.reduce((s,o)=>s+o.aum.value,0),re=visOffices.reduce((s,o)=>s+o.reInvestedEUR,0);
    const pie={};USAGE_KEYS.forEach(k=>pie[k]=0);visOffices.forEach(o=>USAGE_KEYS.forEach(k=>pie[k]+=o.reInvestedEUR*(o.usage[k]||0)/100));
    return {count,aum,re,pie};},[visible]);

  const highlightId = detail? detail.office.id : null;
  sref.current={pinMode};

  useEffect(()=>{
    const map=L.map("map",{zoomControl:true,minZoom:4,maxZoom:19}).setView([50.7,9.8],6);
    tiles.current.sat=L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19,attribution:"Esri World Imagery"});
    tiles.current.labels=L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png",{maxZoom:19});
    tiles.current.street=L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{maxZoom:19,attribution:"© OpenStreetMap, © CARTO"});
    if(window.BORDERS){
      L.geoJSON(window.BORDERS,{interactive:false,style:{color:"#ffffff",weight:5,opacity:.35,fill:false}}).addTo(map);
      L.geoJSON(window.BORDERS,{interactive:false,style:{color:"#0A1F44",weight:2.5,opacity:.85,fill:false}}).addTo(map);
    }
    heatL.current=L.layerGroup().addTo(map);hqL.current=L.layerGroup().addTo(map);objL.current=L.layerGroup().addTo(map);pinL.current=L.layerGroup().addTo(map);
    const applyZoom=()=>{setZoom(map.getZoom());};
    map.on("zoomend",applyZoom);applyZoom();
    map.on("click",e=>{if(sref.current.pinMode){setPin({lat:e.latlng.lat,lng:e.latlng.lng});setPinMode(false);}});
    mapRef.current=map;
  },[]);
  useEffect(()=>{const m=mapRef.current,t=tiles.current;if(!m)return;
    [t.sat,t.labels,t.street].forEach(l=>l&&m.removeLayer(l));
    if(baseLayer==="sat"){t.sat.addTo(m);t.labels.addTo(m);}else t.street.addTo(m);
  },[baseLayer]);

  // HQ markers: big push-pin when zoomed out, full nameplate (logo + name on a
  // white shield) once you zoom in.
  useEffect(()=>{const lyr=hqL.current;if(!lyr)return;lyr.clearLayers();
    const far=zoom<8;
    visible.forEach(({o,type})=>{
      const sel=selected.has(o.id),hl=(o.id===highlightId),est=(type==="estimated"),ring=CM[o.category].color;
      let icon,ttOff;
      if(far){ // a real map pin in the company's status colour
        const head=sel?24:19, stem=Math.round(head*1.15);
        const html=`<div class="pin hqpin${sel?' sel':''}"><div class="head" style="width:${head}px;height:${head}px;background:${ring}"></div><div class="needle" style="height:${stem}px"></div></div>`;
        icon=L.divIcon({html,className:"",iconSize:[head,head+stem],iconAnchor:[head/2,head+stem]});
        ttOff=-(head+stem);
      } else { // full nameplate – solid white shield behind BOTH logo and the whole name
        const html=`<div class="hqbox ${sel?'sel':''} ${est?'est':''} ${hl?'hl':''}" style="--ring:${ring}">`
          +`${o.domain?`<img class="hqico" src="${ico(o.domain)}" onerror="this.remove()"/>`:''}`
          +`<span class="hqname">${o.kurz}</span></div>`;
        icon=L.divIcon({html,iconSize:[0,0],className:""});
        ttOff=-16;
      }
      const m=L.marker([o.hqLat,o.hqLng],{icon,zIndexOffset:(sel||hl)?1000:0}).addTo(lyr);
      m.on("click",()=>toggleSelect(o.id));
      m.bindTooltip(`<b>${o.kurz}</b><br>${o.hqAddress}${est?'<br><i>im Radius: geschätzt (Heatmap)</i>':''}`,{direction:"top",offset:[0,ttOff]});
    });
  },[visible,selected,highlightId,zoom]);

  // heatmap polygons + object pins
  useEffect(()=>{const oly=objL.current,hly=heatL.current;if(!oly)return;oly.clearLayers();hly.clearLayers();
    let objs=[],heats=[];
    if(selected.size>0){DATA.filter(o=>selected.has(o.id)).forEach(o=>{o.confirmedObjects.forEach(ob=>objs.push({o,ob}));(o.heatmap||[]).forEach(r=>heats.push({o,r}));});}
    else if(pin){visible.forEach(({o,conf,heat})=>{conf.forEach(ob=>objs.push({o,ob}));heat.forEach(r=>heats.push({o,r}));});}
    heats.forEach(({o,r})=>{const col=HEAT[r.intensity]||HEAT.mittel;const seed=seedOf(o.id+r.name);
      const halo=L.polygon(blob(r.center,r.radiusKm*1.14,seed),{stroke:false,fillColor:col,fillOpacity:.14,className:"heatpoly",interactive:false}).addTo(hly);
      const core=L.polygon(blob(r.center,r.radiusKm,seed),{color:col,weight:1,opacity:.4,fillColor:col,fillOpacity:.30,className:"heatpoly"}).addTo(hly);
      core.on("click",()=>setDetail({kind:"region",office:o,data:r}));
      core.bindTooltip(`<b>${o.kurz}</b> · Region<br>${r.name} · ${r.intensity}${r.basis==="extrapolation"?" (geschätzt)":""}`,{direction:"top"});
    });
    // zoomed out → every object is a small dot in its colour; the size difference
    // between a huge tower and a small flat, and the type-logo, only appear once
    // you have zoomed in fairly close.
    const t=Math.max(0,Math.min(1,(zoom-8)/6)); // 0 up to z8, 1 at z14+
    objs.forEach(({o,ob})=>{ if(!showSold&&isSold(ob))return; const sold=isSold(ob);
      const col=sold?"#aeb4c0":(UC[ob.usage]||"#888");
      const size=Math.round(Math.min(38, 3.5 + t*(3 + Math.sqrt(ob.valueEUR)*0.95))); // diameter in px
      const showIco=zoom>=12 && size>=20;
      const emoji=USAGE_EMOJI[ob.usage]||"";
      let icon,ttOff;
      if(showIco){ // zoomed in: round badge with the type-logo
        const html=`<div class="objbadge${sold?' sold':''}" style="width:${size}px;height:${size}px;background:#fff;border:${Math.max(1.5,size*0.11)}px solid ${col}">`
          +`<span class="objico" style="font-size:${Math.round(size*0.6)}px">${emoji}</span></div>`;
        icon=L.divIcon({html,className:"",iconSize:[size,size],iconAnchor:[size/2,size/2]});
        ttOff=-size/2;
      } else { // zoomed out: a real, clearly-visible push-pin, coloured head + needle, tip on the spot
        const head=Math.max(16,size+9), stem=Math.round(head*1.15);
        const html=`<div class="pin${sold?' sold':''}"><div class="head" style="width:${head}px;height:${head}px;background:${col}${sold?';border-color:#E4002B':''}"></div><div class="needle" style="height:${stem}px"></div></div>`;
        icon=L.divIcon({html,className:"",iconSize:[head,head+stem],iconAnchor:[head/2,head+stem]});
        ttOff=-(head+stem);
      }
      const m=L.marker([ob.lat,ob.lng],{icon,zIndexOffset:Math.round(ob.valueEUR)}).addTo(oly);
      m.on("click",()=>setDetail({kind:"object",office:o,data:ob}));
      m.bindTooltip(`<b>${o.kurz}</b><br>${ob.name}${sold?' · VERKAUFT':''}<br>${ob.address}`,{direction:"top",offset:[0,ttOff]});
    });
  },[selected,visible,pin,pinRadius,activeUsages,showSold,zoom]);

  // radius pin (non-interactive so objects stay clickable)
  useEffect(()=>{const lyr=pinL.current;if(!lyr)return;lyr.clearLayers();
    if(pin){L.circle([pin.lat,pin.lng],{radius:pinRadius*1000,color:"#0A1F44",weight:1.5,fillColor:"#0A1F44",fillOpacity:.05,interactive:false}).addTo(lyr);
      L.marker([pin.lat,pin.lng],{interactive:false,icon:L.divIcon({className:"",html:'<div style="font-size:26px;transform:translate(-13px,-24px)">📍</div>',iconSize:[0,0]})}).addTo(lyr);}
  },[pin,pinRadius]);

  function toggleSelect(id){setSelected(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});}
  function toggleCat(c){setActiveCats(p=>{const n=new Set(p);n.has(c)?n.delete(c):n.add(c);return n;});}
  function toggleUsage(k){setActiveUsages(p=>{const n=new Set(p);n.has(k)?n.delete(k):n.add(k);return n;});}

  const tableRows=useMemo(()=>{const rows=visOffices.map(o=>({id:o.id,Name:o.kurz,HQ:o.hqAddress,Typ:o.typ,Land:o.land,
    aumV:o.aum.value,reV:o.reInvestedEUR,reP:o.reQuote.value,objs:o.confirmedObjects.length,Website:o.website,Kontakt:o.contactName}));
    rows.sort((a,b)=>{const x=a[sortKey],y=b[sortKey];return typeof x==="number"?(x-y)*sortDir:(""+x).localeCompare(""+y)*sortDir;});return rows;},[visible,sortKey,sortDir]);
  function sortBy(k){sortKey===k?setSortDir(d=>-d):(setSortKey(k),setSortDir(1));}
  function exportXlsx(){const ws=XLSX.utils.json_to_sheet(tableRows.map(r=>({Name:r.Name,Headquarter:r.HQ,Typ:r.Typ,Land:r.Land,
    "AUM (Mrd €)":r.aumV,"Immobilien (Mrd €)":r.reV,"Immobilienquote":Math.round(r.reP*100)+"%",Objekte:r.objs,Website:r.Website,Kontakt:r.Kontakt})));
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Family Offices");
    // second tab: every known object of the listed firms
    const objRows=[];
    visOffices.forEach(o=>o.confirmedObjects.forEach(ob=>objRows.push({
      Firma:o.kurz, Objekt:ob.name, Nutzung:UL[ob.usage]||ob.usage, Adresse:ob.address||"",
      "Fläche":ob.area||"", Kaufdatum:ob.purchaseDate||"", "Wert (Mio €)":ob.valueEUR??"",
      Status:ob.status||"", Verkauft:isSold(ob)?"ja":"nein"})));
    if(objRows.length===0) objRows.push({Firma:"—",Objekt:"keine öffentlich belegten Objekte",Nutzung:"",Adresse:"",Fläche:"",Kaufdatum:"","Wert (Mio €)":"",Status:"",Verkauft:""});
    const ws2=XLSX.utils.json_to_sheet(objRows);
    XLSX.utils.book_append_sheet(wb,ws2,"Objekte");
    XLSX.writeFile(wb,"family_offices_auswahl.xlsx");}

  const selOffices=DATA.filter(o=>selected.has(o.id));
  const cols=[["Name","Name"],["HQ","Headquarter"],["Typ","Typ"],["Land","Land"],["aumV","AUM"],["reV","Immob. €"],["reP","Immob. %"],["objs","# Obj."],["Website","Website"],["Kontakt","Kontakt"]];

  return (
   <React.Fragment>
     <div id="map"></div>

     <div className="topbar glass">
       <div><h1>Family Offices · Immobilien-Map</h1><div className="sub">Pilot: 10 Offices · Stand 07/2026</div></div>
       <button className="iBtn" title="Datenqualität / Disclaimer" onClick={()=>setShowDisc(v=>!v)}>ⓘ</button>
     </div>
     {showDisc && (
       <div className="discpop glass">
         <div className="lights" style={{marginBottom:8}}><span className="light l-red" onClick={()=>setShowDisc(false)}/><span className="light l-yellow dis"/><span className="light l-green dis"/></div>
         <b>Datenqualität &amp; Schätzungen</b><br/>
         Nicht alle Daten sind zu 100 % bestätigt. Geschätzte Werte (AUM, Immobilienquote, Heatmap-Regionen)
         sind mit <span className="est-badge">geschätzt</span> markiert und tragen eigene Quellen — abrufbar direkt am Datenpunkt.<br/><br/>
         <b>Pin</b> mit weißem Kern = bestätigtes Objekt (exakte Adresse). <b>Weiche Fläche</b> = geschätzte Region (Heatmap).<br/>
         <span className="sold-badge">verkauft</span> = Objekt nicht mehr im Bestand (per Toggle ausblendbar).<br/>
         Gestrichelter Logo-Rahmen = im Radius nur über Heatmap getroffen (geschätzt).
       </div>
     )}

     {/* RIGHT COLUMN (stacked, never overlapping) */}
     <div className="rightcol">
       <div className="panel glass">
         <h2 className="hd">Immobilien-Status</h2>
         {CATS.map(c=><div key={c} className={"dotrow"+(activeCats.has(c)?"":" off")} onClick={()=>toggleCat(c)}>
           <span className="dot" style={{background:CM[c].color}}/><span className="dotlabel">{CM[c].label}</span></div>)}
       </div>
       <div className="panel glass">
         <h2 className="hd">Auswahl · Kennzahlen</h2>
         <div className="stat"><span>Unternehmen</span><b>{agg.count}</b></div>
         <div className="stat"><span>Verwaltetes Vermögen</span><b>{fmtB(agg.aum)}</b></div>
         <div className="stat"><span>davon Immobilien</span><b>{fmtB(agg.re)}</b></div>
         <Pie data={agg.pie} activeUsages={activeUsages} onToggle={toggleUsage}/>
       </div>
       {selOffices.length>0 && (
         <div className="panel glass detail">
           <div className="lights" style={{marginBottom:8}}><span className="light l-red" title="Auswahl schließen" onClick={()=>setSelected(new Set())}/><span className="light l-yellow dis"/><span className="light l-green dis"/></div>
           <h3>{selOffices.length===1?selOffices[0].kurz:selOffices.length+" Offices ausgewählt"}</h3>
           {selOffices.length===1 ? <FirmDetail o={selOffices[0]} onObj={(o,ob)=>setDetail({kind:"object",office:o,data:ob})} onReg={(o,r)=>setDetail({kind:"region",office:o,data:r})}/> :
             <div className="meta">{selOffices.map(o=>o.kurz).join(" · ")}<br/>Objekte &amp; Heatmaps aller ausgewählten Offices sind eingeblendet.</div>}
         </div>
       )}
     </div>

     {/* ADVANCED SORT (left) */}
     <div className="adv glass">
       <h2 className="hd">Advanced Sort</h2>
       <div className="fld"><label>Land</label>
         <select value={country} onChange={e=>setCountry(e.target.value)}>{countries.map(c=><option key={c} value={c}>{c==="all"?"Alle Länder":c}</option>)}</select></div>
       <div className="fld"><label>Typ</label>
         <select value={typF} onChange={e=>setTypF(e.target.value)}><option value="all">Alle (SFO + MFO)</option><option value="SFO">Single Family Office</option><option value="MFO">Multi Family Office</option></select></div>
       <div className="fld"><label>AUM-Bereich (Mrd €): {minAum} – {maxAum}</label>
         <div className="row2"><input type="number" value={minAum} min="0" max="50" onChange={e=>setMinAum(+e.target.value)}/><input type="number" value={maxAum} min="0" max="50" onChange={e=>setMaxAum(+e.target.value)}/></div></div>
       <div className="fld"><label>Immobilienquote min: {minReQ}%</label>
         <input type="range" min="0" max="100" value={minReQ} style={{width:"100%"}} onChange={e=>setMinReQ(+e.target.value)}/></div>
       <div className="fld"><label>Immobilien-Nutzung (auch für Pin-Suche)</label>
         <div className="chkgrid">{USAGE_KEYS.map(k=><div key={k} className="chk" onClick={()=>toggleUsage(k)}>
           <span className="sw" style={{background:activeUsages.has(k)?UC[k]:"#c9ced8"}}/>{UL[k]}</div>)}</div></div>
       <div className="togg" onClick={()=>setOnlyObjects(v=>!v)}><div className={"switch"+(onlyObjects?" on":"")}><i/></div> Nur mit bestätigten Objekten</div>
       <div className="togg" onClick={()=>setShowSold(v=>!v)}><div className={"switch"+(showSold?" on":"")}><i/></div> Verkaufte Objekte anzeigen</div>
       <div className="fld" style={{marginTop:10}}><label>📍 Radius-Suche (nutzt alle Filter oben)</label>
         <div className="btnrow"><button className={"btn "+(pinMode?"":"sec")} onClick={()=>setPinMode(m=>!m)}>{pinMode?"Klicke auf Karte…":"Pin setzen"}</button>
           {pin&&<button className="btn ghost" onClick={()=>setPin(null)}>Reset</button>}</div>
         {pin&&<div className="fld" style={{marginTop:8}}><label>Radius: {pinRadius} km</label><input type="range" min="1" max="200" value={pinRadius} style={{width:"100%"}} onChange={e=>setPinRadius(+e.target.value)}/></div>}
         <div className="pininfo">Bestätigtes Objekt im Radius (durchgezogen) + Heatmap-Überschneidung (gestrichelt, geschätzt).</div></div>
       <div className="btnrow"><button className="btn wide" onClick={()=>{setShowTable(true);setWinMode("normal");}}>Als Tabelle zeigen</button></div>
     </div>

     <div className="layerToggle glass">
       <button className={baseLayer==="sat"?"on":""} onClick={()=>setBaseLayer("sat")}>Satellit</button>
       <button className={baseLayer==="street"?"on":""} onClick={()=>setBaseLayer("street")}>Karte</button>
     </div>

     {/* BOTTOM-LEFT: selected firms + expandable picker of the rest */}
     <div className="seldock glass">
       <div className="seldock-h"><b>Auswahl · {selected.size}</b>
         {selected.size>0 && <button className="mini" onClick={()=>setSelected(new Set())}>alle ✕</button>}</div>
       {selected.size===0
         ? <div className="selempty">Noch keine Firma ausgewählt. Unten hinzufügen oder auf der Karte antippen.</div>
         : <div className="selchips">
             {DATA.filter(o=>selected.has(o.id)).sort((a,b)=>a.kurz.localeCompare(b.kurz)).map(o=>(
               <div key={o.id} className="selchip" style={{"--ring":CM[o.category].color}}>
                 <span className="nm">{o.kurz}</span><span className="x" title="abwählen" onClick={()=>toggleSelect(o.id)}>✕</span></div>))}
           </div>}
       <div className="selexp">
         <div className="selexp-h" onClick={()=>setSelOpen(v=>!v)}>
           <span>Firma hinzufügen · {DATA.filter(o=>!selected.has(o.id)).length}</span><span>{selOpen?"▾":"▸"}</span></div>
         {selOpen && <div className="selexp-list">
           {DATA.filter(o=>!selected.has(o.id)).sort((a,b)=>a.kurz.localeCompare(b.kurz)).map(o=>(
             <div key={o.id} className="selrow" onClick={()=>toggleSelect(o.id)}>
               <span className="sc-dot" style={{background:CM[o.category].color}}/>{o.kurz}</div>))}
         </div>}
       </div>
     </div>

     <div className="disc glass" style={{padding:"8px 10px"}}>Objekte = nur öffentlich bekannte DE-Objekte (nicht vollständig). Werte teils Schätzungen.</div>

     {showTable && (
       <div className="winwrap" onMouseDown={e=>{if(e.target.classList.contains("winwrap"))setShowTable(false);}}>
         <div className={"win glass "+(winMode==="min"?"min":winMode==="max"?"max":"")}>
           <div className="titlebar">
             <Lights onClose={()=>setShowTable(false)} onMin={()=>setWinMode(m=>m==="min"?"normal":"min")} onMax={()=>setWinMode(m=>m==="max"?"normal":"max")}/>
             <span className="t">Family Offices — {tableRows.length} Einträge{selected.size?` · ${selected.size} ausgewählt`:""}</span>
             <span className="sp"/><button className="btn sec" onClick={exportXlsx}>Export .xlsx</button>
           </div>
           {winMode!=="min" && <div className="tblscroll"><table>
             <thead><tr><th></th>{cols.map(([k,l])=><th key={k} className={["aumV","reV","reP","objs"].includes(k)?"num":""} onClick={()=>sortBy(k)}>{l}{sortKey===k?(sortDir>0?" ▲":" ▼"):""}</th>)}</tr></thead>
             <tbody>{tableRows.map(r=>(<tr key={r.id}>
               <td><input type="checkbox" checked={selected.has(r.id)} onChange={()=>toggleSelect(r.id)}/></td>
               <td>{r.Name}</td><td>{r.HQ}</td><td>{r.Typ}</td><td>{r.Land}</td>
               <td className="num">{r.aumV}</td><td className="num">{r.reV}</td><td className="num">{Math.round(r.reP*100)}%</td>
               <td className="num">{r.objs}</td><td>{r.Website}</td><td>{r.Kontakt}</td></tr>))}</tbody>
           </table></div>}
         </div>
       </div>
     )}

     {detail && <Seite3 detail={detail} onClose={()=>setDetail(null)}/>}
   </React.Fragment>
  );
}

function FirmDetail({o,onObj,onReg}){
  return (<div>
    <div className="brandhead">{o.domain&&<img src={ico(o.domain)} onError={e=>e.target.style.display='none'}/>}<div className="meta" style={{marginBottom:0}}>{o.name}</div></div>
    <div className="kv"><span>Typ</span><span>{o.typ} · {o.land}</span></div>
    <div className="kv"><span>Headquarter</span><span>{o.hqAddress}</span></div>
    <div className="kv"><span>Website</span><span><a className="lnk" href={/^https?:/.test(o.website)?o.website:"https://"+o.domain} target="_blank">{o.website}</a></span></div>
    {o.linkedin&&<div className="kv"><span>LinkedIn (Firma)</span><span><a className="lnk" href={o.linkedin} target="_blank">Unternehmen</a></span></div>}
    {o.contactLinkedin&&<div className="kv"><span>LinkedIn (Kontakt)</span><span><a className="lnk" href={o.contactLinkedin} target="_blank">{o.contactLinkedinName||"Ansprechpartner"}</a></span></div>}
    <div className="kv"><span>Kontakt</span><span>{o.contactName}</span></div>
    <div className="kv"><span>Ansprache</span><span>{o.contactChannel}</span></div>
    <div className="srcbox">
      <div className="kv" style={{borderTop:"none",paddingTop:0}}><span>AUM {o.aum.basis==="extrapolation"&&<span className="est-badge">geschätzt</span>}</span><b>{fmtB(o.aum.value)}</b></div>
      <Sources field={o.aum} label="Beleg"/></div>
    <div className="srcbox">
      <div className="kv" style={{borderTop:"none",paddingTop:0}}><span>Immobilienquote {o.reQuote.basis==="extrapolation"&&<span className="est-badge">geschätzt</span>}</span><b>{Math.round(o.reQuote.value*100)}% · {fmtB(o.reInvestedEUR)}</b></div>
      <Sources field={o.reQuote} label="Beleg"/></div>
    <div className="objlist">
      <div style={{fontSize:12,color:"#5b6577",margin:"10px 0 4px",textTransform:"uppercase",letterSpacing:.5}}>Bestätigte Objekte ({o.confirmedObjects.length})</div>
      {o.confirmedObjects.length===0&&<div className="obj a" style={{cursor:"default"}}>Keine Einzelobjekte öffentlich belegt.</div>}
      {o.confirmedObjects.map((ob,i)=><div className="obj" key={i} onClick={()=>onObj(o,ob)}><b>{ob.name}</b> · {UL[ob.usage]}{isSold(ob)&&<span className="sold-badge">verkauft</span>} ›<br/><span className="a">{ob.address}</span></div>)}
      <div style={{fontSize:12,color:"#5b6577",margin:"12px 0 4px",textTransform:"uppercase",letterSpacing:.5}}>Heatmap-Regionen ({(o.heatmap||[]).length})</div>
      {(o.heatmap||[]).map((r,i)=><div className="obj" key={i} onClick={()=>onReg(o,r)}><b>{r.name}</b> · {r.intensity} {r.basis==="extrapolation"&&<span className="est-badge">geschätzt</span>} ›<br/><span className="a">{r.usages?r.usages.map(u=>UL[u]).join(", "):"Nutzungsart nicht spezifiziert"}</span></div>)}
    </div>
  </div>);
}

function Seite3({detail,onClose}){
  const {kind,office,data}=detail,isObj=kind==="object";
  const col=isObj?(isSold(data)?"#E4002B":(UC[data.usage]||"#888")):"#ffb02e";
  return (<div className="s3wrap" onMouseDown={e=>{if(e.target.classList.contains("s3wrap"))onClose();}}>
    <div className="s3 glass">
      <div className="hd">
        <div className="lights"><span className="light l-red" onClick={onClose}/><span className="light l-yellow dis"/><span className="light l-green dis"/></div>
        {office.domain&&<img src={ico(office.domain)} onError={e=>e.target.style.display='none'} style={{width:22,height:22,borderRadius:5,objectFit:"contain"}}/>}
        <span style={{fontSize:12,fontWeight:700,color:"#0A1F44"}}>{office.kurz}</span>
      </div>
      <div className="bd">
        <span className="tag" style={{background:col}}>{isObj?(isSold(data)?"Verkauftes Objekt":"Bestätigtes Objekt"):"Heatmap-Region (geschätzt)"}</span>
        <h3 style={{marginTop:8}}>{data.name}</h3>
        {isObj ? (<div>
          <div className="kv"><span>Adresse</span><span>{data.address}</span></div>
          <div className="kv"><span>Nutzungsart</span><span>{UL[data.usage]}</span></div>
          <div className="kv"><span>Fläche</span><span>{data.area||"—"}</span></div>
          <div className="kv"><span>Kaufdatum</span><span>{data.purchaseDate||"—"}</span></div>
          <div className="kv"><span>Wert (Schätzung)</span><span>~{data.valueEUR} Mio €</span></div>
          <div className="kv"><span>Status</span><span>{data.status}{isSold(data)&&<span className="sold-badge">verkauft</span>}</span></div>
          {data.images&&data.images.length>0? <div style={{marginTop:8}}>{data.images.map((u,i)=><img key={i} src={u} style={{width:"100%",borderRadius:10,marginBottom:6}}/>)}</div> : <div className="src" style={{marginTop:8}}>Keine Bilder verfügbar.</div>}
          <div className="srcbox"><Sources field={{basis:"quelle",sources:data.sources}} label="Quelle"/></div>
        </div>) : (<div>
          <div className="kv"><span>Region</span><span>{data.name}</span></div>
          <div className="kv"><span>Investitionsintensität</span><span style={{textTransform:"capitalize"}}>{data.intensity}</span></div>
          <div className="kv"><span>Nutzungsart</span><span>{data.usages?data.usages.map(u=>UL[u]).join(", "):"nicht spezifiziert"}</span></div>
          <div className="src" style={{marginTop:8}}>Keine exakte Adresse / kein Kaufdatum / kein exakter Wert – da nicht vorhanden.</div>
          <div className="srcbox"><Sources field={data} label="Beleg"/></div>
        </div>)}
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
